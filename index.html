<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enpro Training Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* =========================================================
   DESIGN TOKENS
   ========================================================= */
:root {
  --red:        #C8102E;
  --red-dark:   #9B0C22;
  --red-light:  #FDEAED;
  --white:      #FFFFFF;
  --black:      #111111;
  --gray-50:    #F9F9F9;
  --gray-100:   #F2F2F2;
  --gray-200:   #E5E5E5;
  --gray-400:   #9E9E9E;
  --gray-600:   #5C5C5C;
  --success:    #1A7F4B;
  --success-bg: #E6F4ED;
  --warn:       #B45309;
  --warn-bg:    #FEF3C7;
  --danger:     #C8102E;
  --danger-bg:  #FDEAED;
  --info:       #1D4ED8;
  --info-bg:    #EFF6FF;

  --bg:         var(--white);
  --bg-surface: var(--gray-50);
  --bg-card:    var(--white);
  --border:     var(--gray-200);
  --text:       var(--black);
  --text-muted: var(--gray-600);
  --shadow:     0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  --shadow-sm:  0 1px 3px rgba(0,0,0,.08);
  --radius:     10px;
  --radius-sm:  6px;
  --font:       'Segoe UI', system-ui, -apple-system, sans-serif;
}

[data-theme="dark"] {
  --bg:         #0F0F0F;
  --bg-surface: #1A1A1A;
  --bg-card:    #1F1F1F;
  --border:     #2E2E2E;
  --text:       #F0F0F0;
  --text-muted: #888;
  --shadow:     0 1px 4px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
  --red-light:  #2A0A10;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }
a { color: var(--red); text-decoration: none; }
img { max-width: 100%; }
button { font-family: var(--font); cursor: pointer; border: none; outline: none; }
input, textarea, select { font-family: var(--font); }

/* =========================================================
   LAYOUT
   ========================================================= */
#app { display: flex; min-height: 100vh; }

/* Sidebar */
#sidebar {
  width: 240px; min-height: 100vh; background: var(--bg-card);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; z-index: 200; transition: transform .25s;
}
#sidebar.hidden { transform: translateX(-100%); }
#sidebar-logo {
  padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
#sidebar-logo .logo-mark {
  width: 36px; height: 36px; border-radius: 8px; background: var(--red);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 800; font-size: 15px; flex-shrink: 0;
}
#sidebar-logo .logo-text { font-size: 13px; font-weight: 700; line-height: 1.3; }
#sidebar-logo .logo-text span { display: block; color: var(--text-muted); font-weight: 400; font-size: 11px; }
#sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 0; }
.nav-section { padding: 4px 12px 2px; font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--text-muted); text-transform: uppercase; margin-top: 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 16px;
  font-size: 13.5px; color: var(--text); border-radius: var(--radius-sm);
  margin: 1px 8px; cursor: pointer; transition: background .15s, color .15s;
}
.nav-item:hover { background: var(--gray-100); }
.nav-item.active { background: var(--red-light); color: var(--red); font-weight: 600; }
[data-theme="dark"] .nav-item:hover { background: #2a2a2a; }
[data-theme="dark"] .nav-item.active { background: #2A0A10; }
.nav-item .nav-icon { width: 18px; text-align: center; flex-shrink: 0; }
#sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
.user-chip {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  border-radius: var(--radius-sm); background: var(--bg-surface);
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%; background: var(--red);
  color: white; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.user-chip-info { flex: 1; min-width: 0; }
.user-chip-name { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-chip-role { font-size: 11px; color: var(--text-muted); }

/* Overlay */
#overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 150; }
#overlay.show { display: block; }

/* Main content */
#main {
  flex: 1; margin-left: 240px; min-height: 100vh;
  display: flex; flex-direction: column;
}
@media (max-width: 768px) {
  #main { margin-left: 0; }
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
}

/* Topbar */
#topbar {
  height: 56px; background: var(--bg-card); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 12px; position: sticky; top: 0; z-index: 100;
}
#menu-toggle { display: none; background: none; padding: 6px; color: var(--text); font-size: 20px; }
@media (max-width: 768px) { #menu-toggle { display: block; } }
#topbar-title { font-size: 15px; font-weight: 700; flex: 1; }
#theme-toggle {
  width: 34px; height: 34px; border-radius: var(--radius-sm); background: var(--bg-surface);
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--text);
}
#logout-btn {
  padding: 6px 14px; border-radius: var(--radius-sm); background: var(--red-light);
  color: var(--red); font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1px solid transparent; transition: background .15s;
}
#logout-btn:hover { background: var(--red); color: white; }

/* Page content */
#page-content { flex: 1; padding: 24px; max-width: 1100px; width: 100%; }
@media (max-width: 480px) { #page-content { padding: 16px; } }

/* =========================================================
   LOGIN PAGE
   ========================================================= */
#login-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg); padding: 16px;
}
.login-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
  padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: var(--shadow);
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo-mark {
  width: 56px; height: 56px; border-radius: 14px; background: var(--red);
  display: inline-flex; align-items: center; justify-content: center;
  color: white; font-weight: 900; font-size: 22px; margin-bottom: 10px;
}
.login-logo h1 { font-size: 20px; font-weight: 800; }
.login-logo p { font-size: 12.5px; color: var(--text-muted); }

/* =========================================================
   COMPONENTS
   ========================================================= */
/* Cards */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden;
}
.card-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.card-title { font-size: 14px; font-weight: 700; }
.card-body { padding: 20px; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; box-shadow: var(--shadow-sm);
}
.stat-label { font-size: 11.5px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 800; color: var(--red); line-height: 1; }
.stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* Form elements */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; }
.form-control {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); font-size: 14px; transition: border-color .15s;
}
.form-control:focus { outline: none; border-color: var(--red); }
.form-control::placeholder { color: var(--gray-400); }
.form-hint { font-size: 11.5px; color: var(--text-muted); margin-top: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
  border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent; transition: all .15s; white-space: nowrap;
}
.btn-sm { padding: 6px 12px; font-size: 12.5px; }
.btn-primary { background: var(--red); color: white; }
.btn-primary:hover { background: var(--red-dark); }
.btn-secondary { background: var(--bg-surface); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { background: var(--gray-200); }
.btn-danger { background: var(--danger-bg); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: white; }
.btn-success { background: var(--success-bg); color: var(--success); }
.btn-success:hover { background: var(--success); color: white; }
.btn-full { width: 100%; justify-content: center; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* Badges */
.badge {
  display: inline-flex; align-items: center; padding: 2px 8px;
  border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
}
.badge-pending  { background: var(--warn-bg);    color: var(--warn);    }
.badge-submitted{ background: var(--info-bg);    color: var(--info);    }
.badge-approved { background: var(--success-bg); color: var(--success); }
.badge-rejected { background: var(--danger-bg);  color: var(--danger);  }
.badge-active   { background: var(--success-bg); color: var(--success); }
.badge-inactive { background: var(--gray-100);   color: var(--gray-600);}
.badge-reset    { background: var(--warn-bg);    color: var(--warn);    }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
th { padding: 10px 14px; text-align: left; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-surface); }

/* Alerts */
.alert { padding: 11px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 14px; }
.alert-error   { background: var(--danger-bg);  color: var(--danger);  border: 1px solid #f5c6cb; }
.alert-success { background: var(--success-bg); color: var(--success); border: 1px solid #b7dfc9; }
.alert-info    { background: var(--info-bg);    color: var(--info);    border: 1px solid #bfdbfe; }
.alert-warn    { background: var(--warn-bg);    color: var(--warn);    border: 1px solid #fde68a; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 500;
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.modal {
  background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow);
  width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close { background: none; font-size: 20px; color: var(--text-muted); padding: 2px 6px; border-radius: 4px; }
.modal-close:hover { background: var(--bg-surface); }
.modal-body { padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* Checklist */
.checklist-item {
  display: flex; align-items: flex-start; gap: 12px; padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.checklist-item:last-child { border-bottom: none; }
.checklist-item input[type="checkbox"] { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--red); flex-shrink: 0; }
.checklist-item-label { flex: 1; font-size: 14px; }
.checklist-item-photo { margin-top: 8px; }

/* Page header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
.page-title { font-size: 20px; font-weight: 800; }
.page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* Empty state */
.empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.empty-text { font-size: 13px; }

/* Tabs */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab-btn {
  padding: 9px 16px; font-size: 13.5px; font-weight: 600; background: none;
  color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
  cursor: pointer; transition: color .15s, border-color .15s;
}
.tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

/* Permission grid */
.perm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.perm-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer;
}
.perm-item input[type="checkbox"] { accent-color: var(--red); width: 16px; height: 16px; flex-shrink: 0; }
.perm-item label { font-size: 13px; cursor: pointer; }

/* Drag handle placeholder for checklist ordering */
.drag-handle { color: var(--gray-400); cursor: grab; font-size: 16px; padding: 0 4px; }

/* Loading spinner */
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--red); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Photo preview */
.photo-preview { width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--border); }

/* Config notice */
#config-banner {
  background: var(--warn-bg); border-bottom: 1px solid #fde68a;
  padding: 10px 20px; font-size: 13px; color: var(--warn); text-align: center; display: none;
}

/* =========================================================
   RESPONSIVE UTILITIES
   ========================================================= */
.hide-mobile { }
@media (max-width: 480px) {
  .hide-mobile { display: none !important; }
  .card-header { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- Config banner shown if Supabase not configured -->
<div id="config-banner">⚠️ Supabase not configured. Open this file and set <strong>SUPABASE_URL</strong> and <strong>SUPABASE_KEY (anon key)</strong> at the top of the script.</div>

<!-- LOGIN PAGE -->
<div id="login-page" style="display:flex;">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">E</div>
      <h1>Enpro Industries</h1>
      <p>Training Management System</p>
    </div>
    <div id="login-alert"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-control" type="email" id="login-email" placeholder="admin@enpro.com" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="handleLogin()">Sign In</button>
    <div style="margin-top:16px; text-align:center;">
      <button class="btn btn-secondary btn-sm" onclick="toggleTheme()" style="width:auto;">🌓 Toggle theme</button>
    </div>
  </div>
</div>

<!-- FORCE PASSWORD CHANGE -->
<div id="password-change-page" style="display:none; min-height:100vh; align-items:center; justify-content:center; background:var(--bg); padding:16px; flex-direction:column;">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">E</div>
      <h1>Set New Password</h1>
      <p>You must change your temporary password before continuing.</p>
    </div>
    <div id="pwchange-alert"></div>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input class="form-control" type="password" id="new-password" placeholder="Min 8 characters"/>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm New Password</label>
      <input class="form-control" type="password" id="confirm-password" placeholder="Repeat password"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="handlePasswordChange()">Save & Continue</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-shell" style="display:none;">
  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-logo">
      <div class="logo-mark">E</div>
      <div class="logo-text">Enpro Industries<span>Training System</span></div>
    </div>
    <nav id="sidebar-nav">
      <!-- Rendered by JS based on permissions -->
    </nav>
    <div id="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-chip-info">
          <div class="user-chip-name" id="sidebar-name">—</div>
          <div class="user-chip-role" id="sidebar-role">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div id="topbar-title">Dashboard</div>
      <button id="theme-toggle" onclick="toggleTheme()">🌓</button>
      <button id="logout-btn" onclick="handleLogout()">Sign out</button>
    </div>
    <div id="page-content">
      <!-- Pages rendered here -->
    </div>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script>
// =========================================================
// CONFIGURATION — SET THESE BEFORE DEPLOYING
// =========================================================
const SUPABASE_URL = 'https://xnppjwzikoouscqlzlxc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhucHBqd3ppa29vdXNjcWx6bHhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MjI0MDMsImV4cCI6MjA5ODI5ODQwM30.fgmTrSy9GhEYzXTzUc18PbpNMtT-huxPdTN6YYxTa78'; // service_role key

// =========================================================
// BCRYPT SHIM — normalise across CDN variants
// =========================================================
const bcrypt = window.bcrypt || (window.dcodeIO && window.dcodeIO.bcrypt) || window.bcryptjs;

// =========================================================
// PAGE VISIBILITY HELPERS
// =========================================================
function showPage(id, displayType) {
  ['login-page','password-change-page','app-shell'].forEach(p => {
    document.getElementById(p).style.display = 'none';
  });
  document.getElementById(id).style.display = displayType || 'flex';
}

// =========================================================
// INIT
// =========================================================
let supabase;
let currentUser = null;
let currentPerms = null;

function initSupabase() {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL' || SUPABASE_KEY === 'YOUR_SUPABASE_ANON_KEY') {
    document.getElementById('config-banner').style.display = 'block';
    return false;
  }
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return true;
}

window.addEventListener('DOMContentLoaded', () => {
  initSupabase();
  const saved = sessionStorage.getItem('enpro_user');
  if (saved) {
    const data = JSON.parse(saved);
    currentUser = data.user;
    currentPerms = data.perms;
    showApp();
  }
  // Apply saved theme
  const t = localStorage.getItem('enpro_theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
});

// =========================================================
// THEME
// =========================================================
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('enpro_theme', next);
}

// =========================================================
// AUTH
// =========================================================
// Raw REST fetch — bypasses Supabase JS auth interceptor entirely
async function sbFetch(path, opts = {}) {
  const url = SUPABASE_URL.replace(/\/$/, '') + '/rest/v1/' + path;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...(opts.headers || {})
    }
  });
  const text = await res.text();
  let json;
  try { json = text ? JSON.parse(text) : null; } catch { json = { message: text }; }
  if (!res.ok) throw new Error(json?.message || json?.error || 'Request failed (' + res.status + ')');
  return json;
}

async function handleLogin() {
  if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') {
    showAlert('login-alert', 'Supabase not configured.', 'error'); return;
  }
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showAlert('login-alert', 'Please enter email and password.', 'error'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';

  try {
    // Fetch user + permissions using raw REST — no auth interceptor
    const rows = await sbFetch(
      'app_users?email=eq.' + encodeURIComponent(email) +
      '&select=*,user_permissions(*)&limit=1'
    );

    const user = rows && rows[0];
    if (!user) { showAlert('login-alert', 'Invalid email or password.', 'error'); return; }
    if (user.status === 'inactive') { showAlert('login-alert', 'Your account is inactive. Contact admin.', 'error'); return; }

    const valid = await bcrypt.compare(password, user.password_hash);
    if (!valid) { showAlert('login-alert', 'Invalid email or password.', 'error'); return; }

    // Log login (best-effort, don't block on failure)
    sbFetch('audit_log', {
      method: 'POST', prefer: 'return=minimal',
      body: JSON.stringify({ actor_id: user.id, action: 'login', target_type: 'user', target_id: user.id })
    }).catch(() => {});

    currentUser = user;
    currentPerms = (user.user_permissions && user.user_permissions[0]) || {};

    if (user.status === 'password_reset_required') {
      sessionStorage.setItem('enpro_pending_user', JSON.stringify({ user, perms: currentPerms }));
      showPasswordChangePage();
      return;
    }

    sessionStorage.setItem('enpro_user', JSON.stringify({ user, perms: currentPerms }));
    showApp();
  } catch(e) {
    showAlert('login-alert', 'Login failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function showPasswordChangePage() {
  showPage('password-change-page', 'flex');
}

async function handlePasswordChange() {
  const np = document.getElementById('new-password').value;
  const cp = document.getElementById('confirm-password').value;
  if (np.length < 8) { showAlert('pwchange-alert', 'Password must be at least 8 characters.', 'error'); return; }
  if (np !== cp) { showAlert('pwchange-alert', 'Passwords do not match.', 'error'); return; }

  const pending = JSON.parse(sessionStorage.getItem('enpro_pending_user'));
  try {
    const hash = await bcrypt.hash(np, 10);
    await sbFetch('app_users?id=eq.' + pending.user.id, {
      method: 'PATCH', prefer: 'return=minimal',
      body: JSON.stringify({ password_hash: hash, status: 'active' })
    });
    sbFetch('audit_log', {
      method: 'POST', prefer: 'return=minimal',
      body: JSON.stringify({ actor_id: pending.user.id, action: 'password_changed', target_type: 'user', target_id: pending.user.id })
    }).catch(() => {});

    pending.user.status = 'active';
    sessionStorage.removeItem('enpro_pending_user');
    sessionStorage.setItem('enpro_user', JSON.stringify(pending));
    currentUser = pending.user;
    currentPerms = pending.perms;
    showApp();
  } catch(e) {
    showAlert('pwchange-alert', 'Failed to update password: ' + e.message, 'error');
  }
}

function handleLogout() {
  sessionStorage.removeItem('enpro_user');
  currentUser = null; currentPerms = null;
  showPage('login-page', 'flex');
}

function setActiveNav(page) {

// --- OPEN ASSIGNMENT (checklist) ---
async function openAssignment(id) {
  const { data: assignment, error } = await supabase
    .from('training_assignments')
    .select('*, trainings(title, description, training_checklist_items(*))')
    .eq('id', id).single();
  if (error) { showToast('Failed to load assignment', 'error'); return; }

  const items = assignment.trainings?.training_checklist_items || [];
  const { data: responses } = await supabase.from('assignment_checklist_responses').select('*').eq('assignment_id', id);
  const respMap = {};
  (responses||[]).forEach(r => { respMap[r.checklist_item_id] = r; });

  const canEdit = assignment.assigned_to === currentUser.id && ['pending','rejected'].includes(assignment.status);
  const canApprove = currentPerms.can_approve_completions && assignment.status === 'submitted';

  const checklistHtml = items.sort((a,b)=>a.order_index-b.order_index).map(item => {
    const resp = respMap[item.id] || {};
    return `<div class="checklist-item" id="ci-${item.id}">
      <input type="checkbox" id="chk-${item.id}" ${resp.is_checked?'checked':''} ${canEdit?'':'disabled'} onchange="saveChecklistItem('${id}','${item.id}')"/>
      <div class="checklist-item-label">
        <div>${item.description}${item.requires_photo?'<span style="color:var(--red);margin-left:4px;">*photo required</span>':''}</div>
        ${resp.photo_url ? `<img src="${resp.photo_url}" class="photo-preview" style="margin-top:6px"/>` : ''}
        ${canEdit && item.requires_photo ? `
          <div class="checklist-item-photo" style="margin-top:6px">
            <input type="file" accept="image/*" capture="environment" id="photo-${item.id}" style="display:none" onchange="uploadChecklistPhoto('${id}','${item.id}')"/>
            <button class="btn btn-sm btn-secondary" onclick="document.getElementById('photo-${item.id}').click()">📷 ${resp.photo_url?'Change photo':'Attach photo'}</button>
          </div>` : ''}
        ${canEdit ? `<textarea class="form-control" style="margin-top:6px;font-size:12px;" rows="1" placeholder="Notes (optional)" id="note-${item.id}" onblur="saveChecklistItem('${id}','${item.id}')">${resp.notes||''}</textarea>` : (resp.notes ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px">${resp.notes}</div>` : '')}
      </div>
    </div>`;
  }).join('');

  const approverSection = canApprove ? `
    <div style="margin-top:16px">
      <div class="form-group"><label class="form-label">Remarks (optional)</label>
        <textarea class="form-control" id="approval-remarks" rows="2" placeholder="Add remarks..."></textarea></div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-success" onclick="approveAssignment('${id}')">✅ Approve</button>
        <button class="btn btn-danger" onclick="rejectAssignment('${id}')">❌ Reject</button>
      </div>
    </div>` : '';

  const submitBtn = canEdit ? `<div style="margin-top:20px"><button class="btn btn-primary" onclick="submitAssignment('${id}')">Submit for Approval</button></div>` : '';

  showModal(`Training: ${assignment.trainings?.title}`, `
    <div style="margin-bottom:12px">${badge(assignment.status)}</div>
    ${assignment.trainings?.description ? `<p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">${assignment.trainings.description}</p>` : ''}
    ${items.length ? checklistHtml : '<p style="color:var(--text-muted)">No checklist items defined.</p>'}
    ${submitBtn}
    ${approverSection}
    ${assignment.approver_remarks ? `<div class="alert alert-info" style="margin-top:12px"><strong>Approver remarks:</strong> ${assignment.approver_remarks}</div>` : ''}
  `);
}

async function saveChecklistItem(assignmentId, itemId) {
  const chk = document.getElementById(`chk-${itemId}`);
  const note = document.getElementById(`note-${itemId}`);
  await supabase.from('assignment_checklist_responses').upsert({
    assignment_id: assignmentId, checklist_item_id: itemId,
    is_checked: chk?.checked||false, notes: note?.value||null, updated_at: new Date().toISOString()
  }, { onConflict: 'assignment_id,checklist_item_id' });
}

async function uploadChecklistPhoto(assignmentId, itemId) {
  const file = document.getElementById(`photo-${itemId}`).files[0];
  if (!file) return;
  const ext = file.name.split('.').pop();
  const path = `${assignmentId}/${itemId}.${ext}`;
  const { error } = await supabase.storage.from('training-photos').upload(path, file, { upsert: true });
  if (error) { showToast('Photo upload failed: ' + error.message, 'error'); return; }
  const { data: { publicUrl } } = supabase.storage.from('training-photos').getPublicUrl(path);
  await supabase.from('assignment_checklist_responses').upsert({
    assignment_id: assignmentId, checklist_item_id: itemId,
    photo_url: publicUrl, updated_at: new Date().toISOString()
  }, { onConflict: 'assignment_id,checklist_item_id' });
  showToast('Photo uploaded!', 'success');
}

async function submitAssignment(id) {
  const { error } = await supabase.from('training_assignments').update({ status: 'submitted', submitted_at: new Date().toISOString() }).eq('id', id);
  if (error) { showToast('Failed to submit', 'error'); return; }
  await supabase.from('audit_log').insert({ actor_id: currentUser.id, action: 'assignment_submitted', target_type: 'assignment', target_id: id });
  closeModal(); showToast('Submitted for approval!', 'success'); pages['my-trainings']();
}

async function approveAssignment(id) {
  const remarks = document.getElementById('approval-remarks')?.value||'';
  const { error } = await supabase.from('training_assignments').update({ status: 'approved', approved_at: new Date().toISOString(), approved_by: currentUser.id, approver_remarks: remarks }).eq('id', id);
  if (error) { showToast('Failed to approve', 'error'); return; }
  await supabase.from('audit_log').insert({ actor_id: currentUser.id, action: 'assignment_approved', target_type: 'assignment', target_id: id });
  closeModal(); showToast('Training approved!', 'success'); pages.approvals();
}

async function rejectAssignment(id) {
  const remarks = document.getElementById('approval-remarks')?.value||'';
  if (!remarks) { showToast('Please add a remark when rejecting.', 'error'); return; }
  const { error } = await supabase.from('training_assignments').update({ status: 'rejected', approver_remarks: remarks }).eq('id', id);
  if (error) { showToast('Failed to reject', 'error'); return; }
  await supabase.from('audit_log').insert({ actor_id: currentUser.id, action: 'assignment_rejected', target_type: 'assignment', target_id: id });
  closeModal(); showToast('Training rejected.', 'success'); pages.approvals();
}

let _ciCounter = 1000;
function checklistItemRow(id, desc, requiresPhoto, idx) {
  const uid = id || `new-${_ciCounter++}`;
  return `<div class="checklist-item" id="cirow-${uid}" style="align-items:center">
    <span class="drag-handle">⠿</span>
    <input class="form-control" style="flex:1;margin-right:8px" value="${desc||''}" id="cidesc-${uid}" placeholder="Checklist item description"/>
    <label style="font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:4px;margin-right:8px">
      <input type="checkbox" ${requiresPhoto?'checked':''} id="ciphoto-${uid}"/> Photo
    </label>
    <button class="btn btn-sm btn-danger" onclick="document.getElementById('cirow-${uid}').remove()">✕</button>
  </div>`;
}

window.addChecklistRow = () => {
  document.getElementById('checklist-editor').insertAdjacentHTML('beforeend', checklistItemRow(null,'',false,0));
};

async function saveTraining(existingId) {
  const title = document.getElementById('t-title').value.trim();
  if (!title) { showAlert('training-alert','Title is required.','error'); return; }
  const desc = document.getElementById('t-desc').value.trim();

  let trainingId = existingId;
  if (existingId) {
    await supabase.from('trainings').update({ title, description: desc||null }).eq('id', existingId);
  } else {
    const { data, error } = await supabase.from('trainings').insert({ title, description: desc||null, created_by: currentUser.id }).select().single();
    if (error) { showAlert('training-alert', error.message, 'error'); return; }
    trainingId = data.id;
  }

  // Rebuild checklist items
  if (existingId) await supabase.from('training_checklist_items').delete().eq('training_id', trainingId);
  const rows = document.querySelectorAll('#checklist-editor .checklist-item');
  const items = [];
  rows.forEach((row, i) => {
    const id = row.id.replace('cirow-','');
    const desc = document.getElementById(`cidesc-${id}`)?.value?.trim();
    const photo = document.getElementById(`ciphoto-${id}`)?.checked;
    if (desc) items.push({ training_id: trainingId, description: desc, requires_photo: photo||false, order_index: i });
  });
  if (items.length) await supabase.from('training_checklist_items').insert(items);

  await supabase.from('audit_log').insert({ actor_id: currentUser.id, action: existingId ? 'training_updated' : 'training_created', target_type: 'training', target_id: trainingId });
  closeModal(); showToast(existingId ? 'Training updated!' : 'Training created!', 'success'); pages.trainings();
}

async function saveWorkflow(existingId) {
  const title = document.getElementById('w-title').value.trim();
  if (!title) { showAlert('workflow-alert','Title is required.','error'); return; }
  const desc = document.getElementById('w-desc').value.trim();
  const type = document.getElementById('w-type').value;
  const trainingIds = Array.from(document.getElementById('w-trainings').selectedOptions).map(o=>o.value);
  const managerIds = Array.from(document.getElementById('w-managers').selectedOptions).map(o=>o.value);

  let wid = existingId;
  if (existingId) {
    await supabase.from('workflows').update({ title, description: desc||null, type }).eq('id', existingId);
    await supabase.from('workflow_trainings').delete().eq('workflow_id', existingId);
    await supabase.from('workflow_managers').delete().eq('workflow_id', existingId);
  } else {
    const { data, error } = await supabase.from('workflows').insert({ title, description: desc||null, type, created_by: currentUser.id }).select().single();
    if (error) { showAlert('workflow-alert', error.message, 'error'); return; }
    wid = data.id;
  }

  if (trainingIds.length) await supabase.from('workflow_trainings').insert(trainingIds.map((tid,i) => ({ workflow_id: wid, training_id: tid, order_index: i })));
  if (managerIds.length) await supabase.from('workflow_managers').insert(managerIds.map(uid => ({ workflow_id: wid, user_id: uid })));

  closeModal(); showToast(existingId ? 'Workflow updated!' : 'Workflow created!', 'success'); pages.workflows();
}

async function saveUser(existingId) {
  const name = document.getElementById('u-name').value.trim();
  const email = document.getElementById('u-email').value.trim();
  const dept = document.getElementById('u-dept').value || null;
  const reports = document.getElementById('u-reports').value || null;

  if (!name || !email) { showAlert('user-alert','Name and email are required.','error'); return; }

  if (existingId) {
    const { error } = await supabase.from('app_users').update({ name, department_id: dept, reports_to: reports }).eq('id', existingId);
    if (error) { showAlert('user-alert', error.message, 'error'); return; }
    closeModal(); showToast('User updated!', 'success'); pages.users();
  } else {
    // Generate temp password
    const tempPw = 'Enp' + Math.random().toString(36).slice(2,6).toUpperCase() + Math.floor(10+Math.random()*90);
    const hash = await bcrypt.hash(tempPw, 10);
    const { data, error } = await supabase.from('app_users').insert({
      name, email, password_hash: hash, status: 'password_reset_required',
      department_id: dept, reports_to: reports, created_by: currentUser.id
    }).select().single();
    if (error) { showAlert('user-alert', error.message, 'error'); return; }
    // Create default (empty) permissions
    await supabase.from('user_permissions').insert({ user_id: data.id, granted_by: currentUser.id });
    // Create notification settings
    await supabase.from('notification_settings').insert({ user_id: data.id });
    await supabase.from('audit_log').insert({ actor_id: currentUser.id, action: 'user_created', target_type: 'user', target_id: data.id });
    closeModal();
    showToast('User created!', 'success');
    // Show temp password prominently
    showModal('User Created', `
      <div class="alert alert-warn"><strong>Temporary Password — share this with ${name}:</strong></div>
      <div style="font-size:28px;font-weight:800;letter-spacing:.1em;text-align:center;padding:16px;background:var(--bg-surface);border-radius:var(--radius-sm);margin:12px 0">${tempPw}</div>
      <p style="font-size:13px;color:var(--text-muted)">The user will be required to change this password on first login. Copy it now — it won't be shown again.</p>`,
      [{ label: 'Done', cls: 'btn-primary', fn: () => { closeModal(); pages.users(); } }]
    );
  }
}

        <thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Target</th><th>Details</th></tr></thead>
        <tbody>${data.map(l => `<tr>
          <td style="white-space:nowrap;font-size:12px">${fmtDateTime(l.created_at)}</td>
          <td>${l.actor?.name||'System'}</td>
          <td><code style="font-size:12px">${l.action}</code></td>
          <td style="font-size:12px">${l.target_type||'—'}</td>
          <td style="font-size:11px;color:var(--text-muted);max-width:200px">${l.details ? JSON.stringify(l.details) : '—'}</td>
        </tr>`).join('')}</tbody>
      </table></div></div>`;
  } catch(e) { el.innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
};

// =========================================================
// MODAL HELPERS
// =========================================================
function showModal(title, body, actions = []) {
  const actHtml = actions.map(a => `<button class="btn ${a.cls}" id="modal-action-${a.label.replace(/\s/g,'')}">${a.label}</button>`).join('');
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">${title}</span>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">${body}</div>
        ${actions.length ? `<div class="modal-footer">${actHtml}<button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>` : ''}
      </div>
    </div>`;
  actions.forEach(a => {
    document.getElementById(`modal-action-${a.label.replace(/\s/g,'')}`).addEventListener('click', a.fn);
  });
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

// =========================================================
// TOAST
// =========================================================
function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.15);transition:opacity .3s;
    background:${type==='success'?'#1A7F4B':type==='error'?'#C8102E':'#1D4ED8'};color:white;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

// =========================================================
// ALERT IN-PAGE
// =========================================================
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

// =========================================================
// HELPERS
// =========================================================
function badge(status) {
  const map = { pending:'badge-pending', submitted:'badge-submitted', approved:'badge-approved', rejected:'badge-rejected', active:'badge-active', inactive:'badge-inactive', password_reset_required:'badge-reset' };
  const label = { password_reset_required: 'Temp Password' };
  return `<span class="badge ${map[status]||''}">${label[status]||status}</span>`;
}
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }); }
function fmtDateTime(d) { if (!d) return '—'; return new Date(d).toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); }

// Allow Enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') handleLogin();
});
</script>
</body>
